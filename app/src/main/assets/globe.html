            top: 0;
            left: 0;
            pointer-events: none;

            font-weight: bold;

            transition: transform 0.2s, background-color 0.2s, border-color 0.2s;
            will-change: transform, left, top;
        }
        .pin-label:active {
            transform: translate(-50%, -120%) scale(0.9);
        }
        .pin-label.selected {
            background: #0d9488;
            color: #ffffff;
            border-color: #ffffff;
            transform: translate(-50%, -120%) scale(1.1);
        }

        const LIVE_WINDOW_BEFORE_MINUTES = 15;
        const LIVE_WINDOW_AFTER_MINUTES = 180;

        function getUserTimeZone() {
            return Intl.DateTimeFormat().resolvedOptions().timeZone || "UTC";
        }

        function getCurrentTime() {
            return new Date();
        }

        function getMatchWindow(match) {
            const kickoffMs = new Date(match.kickoffUtc).getTime();
            return {
                liveStartMs: kickoffMs - LIVE_WINDOW_BEFORE_MINUTES * 60 * 1000,
                liveEndMs: kickoffMs + LIVE_WINDOW_AFTER_MINUTES * 60 * 1000
            };
        }

        function isMatchLive(match, now = getCurrentTime()) {
            const nowMs = now.getTime();
            const { liveStartMs, liveEndMs } = getMatchWindow(match);
            return nowMs >= liveStartMs && nowMs <= liveEndMs;
        }

        function getLiveOrNearestMatch(matches = WORLD_CUP_MATCHES, now = getCurrentTime()) {
            if (!Array.isArray(matches) || matches.length === 0) {
                return null;
            }

            const sortedMatches = [...matches].sort(
                (a, b) => new Date(a.kickoffUtc).getTime() - new Date(b.kickoffUtc).getTime()
            );

            const liveMatch = sortedMatches.find(match => isMatchLive(match, now));
            if (liveMatch) {
                return {
                    match: liveMatch,
                    status: "LIVE"
                };
            }

            const nextMatch = sortedMatches.find(
                match => new Date(match.kickoffUtc).getTime() > now.getTime()
            );
            if (nextMatch) {
                return {

        function formatKickoffForUser(kickoffUtc, userTimeZone = getUserTimeZone()) {
            const kickoffDate = new Date(kickoffUtc);
            if (Number.isNaN(kickoffDate.getTime())) {
                throw new Error(`Invalid kickoff timestamp: ${kickoffUtc}`);
            }

            const dateFormatter = new Intl.DateTimeFormat(navigator.language || "en-US", {
                timeZone: userTimeZone,
                weekday: "short",
                month: "short",
                day: "numeric",
                year: "numeric"
            });

            const timeFormatter = new Intl.DateTimeFormat(navigator.language || "en-US", {
                timeZone: userTimeZone,
                hour: "numeric",
                minute: "2-digit",
                timeZoneName: "short"
            });

            return {
                date: dateFormatter.format(kickoffDate),
                time: timeFormatter.format(kickoffDate),
                timezone: userTimeZone,
                dateTime: `${dateFormatter.format(kickoffDate)} · ${timeFormatter.format(kickoffDate)}`
            };
        }

        function loadFirstAvailableImage(imageCandidates, stadium) {
            const candidates = Array.isArray(imageCandidates) ? imageCandidates.filter(Boolean) : [];
            return new Promise(resolve => {
                let candidateIndex = 0;
                function tryNextImage() {
                    if (candidateIndex >= candidates.length) {
                        resolve(createStadiumPlaceholder(stadium));
                        return;

                    const imageUrl = candidates[candidateIndex];
                    candidateIndex += 1;
                    const imageTest = new Image();
                    imageTest.onload = () => {
                        resolve(imageUrl);
                    };
                    imageTest.onerror = () => {
                        tryNextImage();
                    };
                    imageTest.referrerPolicy = "no-referrer";
                    imageTest.src = imageUrl;
                }
                tryNextImage();
            });

            imageElement.loading = "eager";
            imageElement.decoding = "async";
            imageElement.referrerPolicy = "no-referrer";

            imageElement.src = await loadFirstAvailableImage(stadium.imageCandidates, stadium);
            imageElement.onerror = function () {

            };

            if (!selection) return null;
            const { match, status } = selection;
            const userTimeZone = getUserTimeZone();
            const localKickoff = formatKickoffForUser(match.kickoffUtc, userTimeZone);

                id: match.stadium.id,
                name: match.stadium.regularName,
                fifaName: match.stadium.fifaName,
                city: match.stadium.city,
                metroArea: match.stadium.metroArea,

        function getLiveStadium() {
            const selection = getLiveOrNearestMatch(WORLD_CUP_MATCHES, getCurrentTime());
            if (!selection) return null;
            const { match, status } = selection;
            const userTimeZone = getUserTimeZone();
            const localKickoff = formatKickoffForUser(match.kickoffUtc, userTimeZone);
            const stadium = match.stadium;
            return {
                id: stadium.id,
                name: stadium.regularName,
                fifaName: stadium.fifaName,
                city: stadium.city,
                metroArea: stadium.metroArea,
                country: stadium.country,

                homeTeam: match.homeTeam,

        function activateLiveGameTab() {
            const liveGameTab =
                document.querySelector('[data-tab="live-game"]') ||
                document.querySelector("#live-game-tab") ||
                document.querySelector('[href="#live-game"]');

            const liveGamePanel =
                document.querySelector('[data-panel="live-game"]') ||
                document.querySelector("#live-game-panel") ||
                document.querySelector("#live-game");

            document.querySelectorAll("[data-tab], .tab-button, [role='tab']").forEach(tab => {
                tab.classList.remove("active");
                tab.setAttribute("aria-selected", "false");
            });

            document.querySelectorAll("[data-panel], .tab-panel, [role='tabpanel']").forEach(panel => {
                panel.classList.remove("active");
                panel.hidden = true;
            });

            if (liveGameTab) {
                liveGameTab.classList.add("active");
                liveGameTab.setAttribute("aria-selected", "true");
            }
            if (liveGamePanel) {
                liveGamePanel.classList.add("active");
                liveGamePanel.hidden = false;
            }
        }

        function focusLiveGamePin(stadiumData, shouldFocus = false) {
            if (!stadiumData) return;
            if (shouldFocus) {
                rotateToTarget(stadiumData.lat, stadiumData.lon);
                selectStadium(stadiumData.id, false);
            }
        }

        function setText(selector, value) {
            const element = document.querySelector(selector);
            if (element) {
                element.textContent = value ?? "";
            }
        }

        async function renderLiveGame(shouldFocus = false) {
            try {
                const stadiumData = await getLiveGameStadium();
                if (!stadiumData) {
                    console.warn("No World Cup match data is available.");
                    return;
                }

                setText("#live-match-status", stadiumData.status);
                setText("#live-match-stage", stadiumData.stage);
                setText("#live-match-title", `${stadiumData.homeTeam} vs ${stadiumData.awayTeam}`);
                setText("#live-match-time", stadiumData.time);
                setText("#live-match-timezone", stadiumData.userTimeZone);
                setText("#live-stadium-name", stadiumData.name);
                setText("#live-stadium-fifa-name", stadiumData.fifaName);
                setText("#live-stadium-location", `${stadiumData.city}, ${stadiumData.country}`);
                setText("#live-stadium-capacity", `Capacity: ${stadiumData.capacity}`);
                setText("#live-stadium-weather", stadiumData.weather);

                const stadiumImage = document.querySelector("#live-stadium-image");
                if (stadiumImage) {
                    await setReliableStadiumImage(stadiumImage, { stadium: stadiumData });
                }

                if (shouldFocus) {
                    focusLiveGamePin(stadiumData, true);
                }

                window.currentLiveGameStadium = stadiumData;
                console.info("Live Game loaded:", stadiumData);
            } catch (error) {
                console.error("Unable to render the Live Game:", error);
            }
        }

            "OCEANIA": "https://images.unsplash.com/photo-1524820197278-540916411e20?auto=format&fit=crop&w=600&q=80"
        };
        const region = getRegionForAbbreviation(teamCode);
        image.src = defaultImages[region] || "https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=600&q=80";
        image.alt = "Landmark";
    }
    image.loading = "lazy";

    image.onerror = function () {
        this.onerror = null;
        if (team) {
            this.src =
                `https://placehold.co/800x600/182033/FFFFFF` +
                `?text=${encodeURIComponent(team.capital + " — " + team.landmark)}`;

        function getRegionForAbbreviation(abb) {
            const europe = ["FRA", "ESP", "ENG", "GER", "ITA", "POR", "NED", "BEL", "CRO", "SUI", "DEN", "UKR", "POL", "SWE", "AUT", "TUR"];
            const americas = ["ARG", "BRA", "USA", "MEX", "CAN", "URU", "COL", "ECU", "PER", "CHI", "CRC", "PAN", "JAM"];
            const asia = ["JPN", "KOR", "AUS", "IRN", "KSA", "IRQ", "QAT", "UAE"];
            const africa = ["MAR", "SEN", "NGA", "EGY", "CMR", "ALG", "TUN", "RSA", "GHA", "CIV"];
            const oceania = ["NZL"];
            if (europe.includes(abb)) return "EUROPE";
            if (americas.includes(abb)) return "AMERICAS";
            if (asia.includes(abb)) return "ASIA";
            if (africa.includes(abb)) return "AFRICA";
            if (oceania.includes(abb)) return "OCEANIA";
            return "WORLD";
        }

        let selectedStage = "Quarter-Finals";
        let selectedAbbreviation = null;

        // Three.js Scene Variables
        let scene, camera, renderer, controls;
        let globeSphere, gridLines, atmosphereGlow;

        let fifaTexture = null;
        const sphereRadius = 4.5;
        const labelsContainer = document.getElementById('labels-container');

        // Dynamically creates a 2D high-resolution canvas texture mapping a soccer ball's classic pentagons and gridlines
        function createSoccerBallTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            // Background is pure white
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#111827';
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 2.5;
            
            const rows = 4;
            const cols = 8;
            for (let r = 0; r <= rows; r++) {
                const y = (r / rows) * canvas.height;
                const offset = (r % 2) * (canvas.width / cols / 2);
                for (let c = 0; c <= cols; c++) {
                    const x = ((c / cols) * canvas.width + offset) % canvas.width;
                    
                    // Pentagons
                    ctx.beginPath();
                    const size = 9;
                    for (let i = 0; i < 5; i++) {
                        const angle = (i * 2 * Math.PI / 5) - Math.PI / 2;
                        const px = x + Math.cos(angle) * size;
                        const py = y + Math.sin(angle) * size;
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    
                    // Hexagonal connector lines
                    for (let i = 0; i < 5; i++) {
                        const angle = (i * 2 * Math.PI / 5) - Math.PI / 2;
                        const startX = x + Math.cos(angle) * size;
                        const startY = y + Math.sin(angle) * size;
                        const endX = x + Math.cos(angle) * (size * 1.8);
                        const endY = y + Math.sin(angle) * (size * 1.8);
                        
                        ctx.beginPath();
                        ctx.moveTo(startX, startY);
                        ctx.lineTo(endX, endY);
                        ctx.stroke();
                    }
                }
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.ClampToEdgeWrapping;
            return texture;
        }

        // Dynamically creates a 2D high-resolution canvas texture mapping a high-fidelity FIFA 2026 circular emblem/badge
        function createFifa2026Texture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');

            // Clear to transparent
            ctx.clearRect(0, 0, 256, 256);

            // Outer white circle
            const cx = 128;
            const cy = 110;
            const r = 95;

            ctx.save();
            // Drop shadow for beautiful 3D depth on the globe
            ctx.shadowColor = 'rgba(0, 0, 0, 0.45)';
            ctx.shadowBlur = 12;
            ctx.shadowOffsetY = 5;

            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Clip region for internal drawings
            ctx.save();
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.clip();

            // Draw thick blocky "26" in black
            ctx.fillStyle = '#000000';
            ctx.font = '900 135px "Arial Black", "Helvetica Neue", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // "2" on top
            ctx.fillText("2", cx, cy - 42);
            // "6" at the bottom
            ctx.fillText("6", cx, cy + 42);

            // Draw gold FIFA World Cup Trophy in center
            const trophyW = 42;
            const trophyH = 150;
            const tx = cx - trophyW / 2;
            const ty = cy - trophyH / 2 - 5;

            // Shiny gold linear gradient
            const grad = ctx.createLinearGradient(tx, ty, tx + trophyW, ty);
            grad.addColorStop(0, '#8B6508');   // Dark golden bronze
            grad.addColorStop(0.25, '#DAA520'); // Goldenrod
            grad.addColorStop(0.5, '#FFF8DC');  // Shining cornsilk highlight
            grad.addColorStop(0.75, '#FFD700'); // Gold
            grad.addColorStop(1, '#B8860B');    // Dark gold

            ctx.fillStyle = grad;
            ctx.beginPath();
            // Base of trophy
            ctx.moveTo(cx - 17, cy + 64);
            ctx.quadraticCurveTo(cx, cy + 67, cx + 17, cy + 64);
            ctx.lineTo(cx + 15, cy + 48);
            ctx.quadraticCurveTo(cx, cy + 51, cx - 15, cy + 48);
            ctx.closePath();
            ctx.fill();

            // Two deep green malachite bands on the trophy base
            ctx.fillStyle = '#105e4e'; // Rich green
            ctx.fillRect(cx - 14, cy + 56, 28, 4);
            ctx.fillRect(cx - 15, cy + 50, 30, 4);

            // Stem and body of the trophy curves
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.moveTo(cx - 13, cy + 48);
            // Curves gracefully up to the narrow point, then expands to hold the globe
            ctx.bezierCurveTo(cx - 9, cy + 15, cx - 18, cy - 15, cx - 21, cy - 40);
            // Globe sphere at the top
            ctx.arc(cx, cy - 42, 18, Math.PI, 0);
            ctx.bezierCurveTo(cx + 21, cy - 40, cx + 18, cy - 15, cx + 13, cy + 48);
            ctx.closePath();
            ctx.fill();

            // Trophy inner details (shadows / lines)
            ctx.strokeStyle = '#5c4033'; // Dark brown
            ctx.lineWidth = 1.8;
            ctx.beginPath();
            // Curve lines representing the two figures holding up the globe
            ctx.moveTo(cx - 5, cy + 28);
            ctx.bezierCurveTo(cx - 11, cy + 2, cx - 14, cy - 12, cx - 16, cy - 30);
            ctx.moveTo(cx + 5, cy + 28);
            ctx.bezierCurveTo(cx + 11, cy + 2, cx + 14, cy - 12, cx + 16, cy - 30);
            ctx.stroke();

            // Outline of the globe at the top
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.4)';
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.arc(cx, cy - 42, 18, 0, Math.PI * 2);
            ctx.stroke();

            // Map gridlines inside the globe
            ctx.beginPath();
            ctx.arc(cx - 8, cy - 42, 10, -Math.PI/2, Math.PI/2);
            ctx.arc(cx + 8, cy - 42, 10, Math.PI/2, -Math.PI/2);
            ctx.stroke();

            // Draw "FIFA" text in bold white on the black "26" block background, just across the trophy base
            ctx.fillStyle = '#ffffff';
            ctx.font = '900 12px "Arial Black", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText("FIFA", cx, cy + 35);

            ctx.restore(); // Restore clipping path

            // Draw italic, bold, outlined "2026" at the bottom of the canvas
            const textY = cy + r + 15;
            ctx.font = 'oblique 900 34px "Arial Black", Impact, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Bold black stroke outline
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 7;
            ctx.strokeText("2026", cx, textY);

            // Pure white text fill
            ctx.fillStyle = '#ffffff';
            ctx.fillText("2026", cx, textY);

            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.ClampToEdgeWrapping;
            texture.wrapT = THREE.ClampToEdgeWrapping;
            texture.minFilter = THREE.LinearFilter;
            return texture;
        }

        // Current theme colors

        function buildGlobe() {
            // Remove existing meshes if recreating
            if (globeSphere) scene.remove(globeSphere);
            if (gridLines && gridLines.parent) {
                gridLines.parent.remove(gridLines);
            } else if (gridLines) {
                scene.remove(gridLines);
            }
            if (atmosphereGlow) scene.remove(atmosphereGlow);

            const activeColors = getActiveColors();

            // 1. Create the Inner Ocean Sphere (deep teal / blue-green)
            const oceanGeo = new THREE.SphereGeometry(sphereRadius, 64, 64);
            const oceanMat = new THREE.MeshPhongMaterial({
                color: activeColors.ocean,
                shininess: 30,
                transparent: false
            });
            globeSphere = new THREE.Mesh(oceanGeo, oceanMat);
            globeSphere.rotation.y = Math.PI; // Match standard spherical math with Earth texture wrapping
            scene.add(globeSphere);

            if (pinGroup) {
                globeSphere.add(pinGroup);
            }

            // 2. Create the Outer Landmass Sphere (pale/tan) with alphaMap mask
            const landGeo = new THREE.SphereGeometry(sphereRadius * 1.002, 64, 64);
            const landMat = new THREE.MeshPhongMaterial({
                color: activeColors.sphere,
                shininess: 45,
                transparent: true,
                depthWrite: true
            });
            const landMesh = new THREE.Mesh(landGeo, landMat);
            globeSphere.add(landMesh); // Add as child so they rotate together seamlessly!

            const textureLoader = new THREE.TextureLoader();

            // Load the high-contrast earth-dark map as the alpha mask
            textureLoader.load(
                'https://unpkg.com/three-globe/example/img/earth-dark.jpg',
                function (texture) {
                    landMat.alphaMap = texture;
                    landMat.needsUpdate = true;
                },
                undefined,
                function (err) {
                    console.warn("Failed to load land alpha mask", err);
                }
            );

            // Load bump/elevation map for three-dimensional continental mountains
            const bumpUrl = 'https://unpkg.com/three-globe/example/img/earth-topology.png';
            textureLoader.load(
                bumpUrl,
                function (bumpTexture) {
                    landMat.bumpMap = bumpTexture;
                    landMat.bumpScale = 0.35; // Highly defined, elegant 3D continental mountains
                    landMat.needsUpdate = true;
                },
                undefined,
                function (err) {
                    console.warn("Failed to load elevation/bump texture", err);
                }
            );

            // Procedural Gridlines (Parallels and Meridians) for a high-tech Travel Atlas aesthetic
            const gridGeo = new THREE.BufferGeometry();
            const points = [];
            const segments = 64;

            // Parallels (latitude)
            const latitudes = [-60, -30, 0, 30, 60];
            latitudes.forEach(lat => {
                for (let i = 0; i <= segments; i++) {
                    const lon = -180 + (i / segments) * 360;
                    const pos = latLongToVector3(lat, lon, sphereRadius);
                    points.push(pos.x, pos.y, pos.z);
                    if (i > 0 && i < segments) {
                        points.push(pos.x, pos.y, pos.z);
                    }
                }
            });

            // Meridians (longitude)
            const longitudes = [-120, -60, 0, 60, 120, 180];
            longitudes.forEach(lon => {
                for (let i = 0; i <= segments; i++) {
                    const lat = -90 + (i / segments) * 180;
                    const pos = latLongToVector3(lat, lon, sphereRadius);
                    points.push(pos.x, pos.y, pos.z);
                    if (i > 0 && i < segments) {
                        points.push(pos.x, pos.y, pos.z);
                    }
                }
            });

            gridGeo.setAttribute('position', new THREE.Float32BufferAttribute(points, 3));
            const gridMat = new THREE.LineBasicMaterial({
                color: activeColors.grid,
                transparent: true,
                opacity: activeColors.gridOpacity * 0.8,
                linewidth: 1
            });
            gridLines = new THREE.LineSegments(gridGeo, gridMat);
            globeSphere.add(gridLines);

            // Atmosphere Outer Ring Glow
            const glowGeo = new THREE.SphereGeometry(sphereRadius * 1.06, 32, 32);
            const glowMat = new THREE.MeshBasicMaterial({
                color: activeColors.glow,
                transparent: true,
                opacity: activeColors.glowOpacity,
                side: THREE.BackSide
            });
            atmosphereGlow = new THREE.Mesh(glowGeo, glowMat);
            scene.add(atmosphereGlow);
        }

        // Convert lat/long to 3D Sphere coordinates
        function latLongToVector3(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);

            const x = -radius * Math.cos(theta) * Math.sin(phi);
            const y = radius * Math.cos(phi);
            const z = radius * Math.sin(theta) * Math.sin(phi);

            return new THREE.Vector3(x, y, z);
        }

        // Draw 3D glowing point pins on the globe
        function createPins() {
            // Clear old pins
            while(pinGroup.children.length > 0){
                pinGroup.remove(pinGroup.children[0]);
            }
            pulsingRings = [];

            const activeColors = getActiveColors();
            
            // Pre-load/create the reusable FIFA 2026 emblem texture
            if (!fifaTexture) {
                fifaTexture = createFifa2026Texture();
            }

            teams.forEach(team => {
                const isInteractive = isTeamInteractive(team);
                if (!isInteractive) return;

                const pos = latLongToVector3(team.lat, team.lon, sphereRadius);
                
                // Outer ring for pulsing effect
                const ringGeo = new THREE.RingGeometry(0.02, 0.22, 32);
                const ringMat = new THREE.MeshBasicMaterial({
                    color: activeColors.pin,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.7
                }).clone(); // clone so we can animate individual opacities
                
                const ringMesh = new THREE.Mesh(ringGeo, ringMat);
                ringMesh.position.copy(pos);
                ringMesh.lookAt(0, 0, 0); // Orient flat on sphere
                pinGroup.add(ringMesh);
                pulsingRings.push(ringMesh);

                // Replaced the simple white sphere core with the high-fidelity FIFA 2026 badge
                const badgeGeo = new THREE.CircleGeometry(0.24, 32);
                const badgeMat = new THREE.MeshBasicMaterial({
                    map: fifaTexture,
                    transparent: true,
                    side: THREE.DoubleSide
                });
                const badgeMesh = new THREE.Mesh(badgeGeo, badgeMat);
                
                // Position it slightly above the surface along the normal vector to prevent Z-fighting
                const normal = pos.clone().normalize();
                const badgePos = pos.clone().add(normal.multiplyScalar(0.04));
                badgeMesh.position.copy(badgePos);
                
                // Align the badge normal to face directly outwards from the globe
                badgeMesh.lookAt(pos.clone().add(normal));
                pinGroup.add(badgeMesh);
            });

            // ADD LIVE STADIUM DAY MAP PIN
            const liveStadium = getLiveStadium();
            const stadiumPos = latLongToVector3(liveStadium.lat, liveStadium.lon, sphereRadius);
            
            // Neon green pulsing ring for the stadium field
            const ringGeo = new THREE.RingGeometry(0.02, 0.35, 32);
            const ringMat = new THREE.MeshBasicMaterial({
                color: 0x10b981,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.85
            }).clone();
            
            const ringMesh = new THREE.Mesh(ringGeo, ringMat);
            ringMesh.position.copy(stadiumPos);
            ringMesh.lookAt(0, 0, 0);
            pinGroup.add(ringMesh);
            pulsingRings.push(ringMesh); // This will automatically pulse with our animate loop!

            // Elegant metallic golden pole from stadium to soccer ball
            const poleGeo = new THREE.CylinderGeometry(0.02, 0.04, 0.35, 16);
            poleGeo.translate(0, 0.175, 0); // Position base at origin
            const poleMat = new THREE.MeshPhongMaterial({
                color: 0xd4af37, // Gold metallic color
                metalness: 0.9,
                roughness: 0.1,
                shininess: 100
            });
            const poleMesh = new THREE.Mesh(poleGeo, poleMat);
            poleMesh.position.copy(stadiumPos);
            poleMesh.lookAt(0, 0, 0);
            poleMesh.rotation.x += Math.PI / 2; // Orient outwards
            pinGroup.add(poleMesh);

            // 3D Soccer Ball sphere on top of the golden pole
            const ballGeo = new THREE.SphereGeometry(0.18, 32, 32);
            const ballMat = new THREE.MeshPhongMaterial({
                map: createSoccerBallTexture(),
                shininess: 85,
                bumpScale: 0.05
            });
            const ballMesh = new THREE.Mesh(ballGeo, ballMat);
            
            // Position it slightly above the surface along the normal vector
            const normal = stadiumPos.clone().normalize();
            const ballPos = stadiumPos.clone().add(normal.multiplyScalar(0.35));
            ballMesh.position.copy(ballPos);
            pinGroup.add(ballMesh);
            soccerBallMesh = ballMesh;
        }

        function createLabels() {

            teams.forEach(team => {

                elStadium.classList.add('selected');
            }
            elStadium.id = 'label-' + liveStadium.id;
            elStadium.innerHTML = `<span class="pulse-green-icon">⚽</span><span style="font-size:10px; font-weight:900; letter-spacing: 0.5px;">LIVE GAME</span>`;

            elStadium.addEventListener('click', () => {
                selectStadium(liveStadium.id);
            });

            labelsContainer.appendChild(elStadium);
        }

        // Logic to determine if a team is active based on tournament filter
        function isTeamInteractive(team) {
            if (selectedStage === "All 48") return true;
            if (selectedStage === "All 32" || selectedStage === "R32") {
                return ["ARG", "FRA", "ESP", "BRA", "ENG", "USA", "MEX", "CAN", "GER", "ITA", "POR", "NED", "BEL", "CRO", "URU", "COL", "MAR", "SEN", "JPN", "KOR", "AUS", "SUI", "DEN", "UKR", "POL", "AUT", "ECU", "CHI", "NGA", "EGY", "CMR", "TUR"].includes(team.abbreviation);
            }
            if (selectedStage === "All 16" || selectedStage === "R16") {
                return ["ARG", "FRA", "ESP", "BRA", "ENG", "USA", "MEX", "CAN", "GER", "ITA", "POR", "NED", "BEL", "CRO", "URU", "COL"].includes(team.abbreviation);
            }
            if (selectedStage === "Quarter-Finals") {
                return ["ARG", "FRA", "ESP", "BRA", "ENG", "USA", "MEX", "CAN"].includes(team.abbreviation);
            }
            if (selectedStage === "Semi Finals") {
                return ["ARG", "FRA", "ESP", "BRA"].includes(team.abbreviation);
            }
            if (selectedStage === "2026™ Final") {
                return ["ARG", "FRA"].includes(team.abbreviation);
            }
            return true;
        }

        let selectedStadiumId = null;

        // Bridge function called from Android native side to select a team
        function selectTeamFromAndroid(abbreviation) {
            selectTeam(abbreviation, false);
        }

        // Change Selection
        function selectTeam(abbreviation, notifyAndroid = true) {
            selectedAbbreviation = abbreviation;
            selectedStadiumId = null; // deselect stadium
            
            // Highlight current element
            const labels = document.querySelectorAll('.pin-label');
            labels.forEach(label => {
                if (label.id === 'label-' + abbreviation) {
                    label.classList.add('selected');
                } else {
                    label.classList.remove('selected');
                }
            });

            // Show the popup
            showPopupForTeam(abbreviation);

            // Auto rotation lookAt selected country dot
            const team = teams.find(t => t.abbreviation === abbreviation);
            if (team) {
                rotateToTarget(team.lat, team.lon);
            }

            // Communicate back to Jetpack Compose via Android JavascriptInterface
            if (notifyAndroid && window.Android && window.Android.onCountryClick) {
                window.Android.onCountryClick(abbreviation);
            }
        }

        function selectStadium(stadiumId, notifyAndroid = true) {
            selectedAbbreviation = null; // deselect team
            selectedStadiumId = stadiumId;

            // Highlight current element
            const labels = document.querySelectorAll('.pin-label');
            labels.forEach(label => {
                if (label.id === 'label-' + stadiumId) {
                    label.classList.add('selected');
                } else {
                    label.classList.remove('selected');
                }
            });

            // Show the stadium popup
            showPopupForStadium(stadiumId);

            // Auto rotation lookAt selected stadium
            const liveStadium = getLiveStadium();
            if (liveStadium) {
                rotateToTarget(liveStadium.lat, liveStadium.lon);
            }

            // Communicate back to Jetpack Compose via Android JavascriptInterface
            if (notifyAndroid && window.Android && window.Android.onStadiumClick) {
                window.Android.onStadiumClick(stadiumId);
            }
        }

        function showPopupForTeam(abbreviation) {
            const team = teams.find(t => t.abbreviation === abbreviation);
            let landmark = teamLandmarks[abbreviation];
            const popup = document.getElementById('globe-popup');
            
            if (team && popup) {
                if (!landmark) {
                    const defaultImages = {
                        "AMERICAS": "https://images.unsplash.com/photo-1501594907352-04cda38ebc29?auto=format&fit=crop&w=600&q=80",
                        "EUROPE": "https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=600&q=80",
                        "ASIA": "https://images.unsplash.com/photo-1542051841857-5f90071e7989?auto=format&fit=crop&w=600&q=80",
                        "AFRICA": "https://images.unsplash.com/photo-1547471080-7cc2caa01a7e?auto=format&fit=crop&w=600&q=80",
                        "OCEANIA": "https://images.unsplash.com/photo-1524820197278-540916411e20?auto=format&fit=crop&w=600&q=80"
                    };
                    const region = getRegionForAbbreviation(abbreviation);
                    landmark = {
                        img: defaultImages[region] || "https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=600&q=80",
                        region: region,
                        coords: `${Math.round(team.lat)}°, ${Math.round(team.lon)}°`
                    };
                }
                document.getElementById('popup-coords').innerHTML = `• ${landmark.coords} - ${landmark.region}`;
                
                const oldImg = document.getElementById('popup-img');
                if (oldImg) {
                    const newImg = createLandmarkImage(abbreviation);
                    newImg.id = 'popup-img';
                    newImg.className = 'popup-image';
                    oldImg.parentNode.replaceChild(newImg, oldImg);
                }

                document.getElementById('popup-title').innerHTML = `<span>${team.flag}</span> <span>${team.abbreviation} - ${team.name.toUpperCase()}</span>`;
                
                // Set match info or state info
                const stageText = selectedStage === "All 48" ? "Group Stage" : selectedStage;
                if (selectedStage === "2026™ Final") {
                    document.getElementById('popup-sub').innerHTML = `2026™ World Cup Finalist`;
                } else if (selectedStage === "Semi Finals") {
                    document.getElementById('popup-sub').innerHTML = `Semi-Finalist`;
                } else {
                    document.getElementById('popup-sub').innerHTML = `${stageText} Contender`;
                }
                
                popup.style.display = 'flex';
                // Trigger reflow for transition
                popup.style.opacity = '0';
                popup.style.transform = 'translate(-50%, -115%) scale(0.95)';
                setTimeout(() => {
                    popup.style.opacity = '1';
                    popup.style.transform = 'translate(-50%, -120%) scale(1)';
                }, 10);
            }
        }

        function showPopupForStadium(stadiumId) {
            const liveStadium = getLiveStadium();
            const popup = document.getElementById('globe-popup');
            
            if (liveStadium && popup) {
                document.getElementById('popup-coords').innerHTML = `• MATCH DAY • ${liveStadium.city.toUpperCase()}`;
                
                const imgEl = document.getElementById('popup-img');
                if (imgEl) {
                    imgEl.onerror = null;
                    const match = WORLD_CUP_MATCHES.find(m => m.stadium.id === liveStadium.id);
                    if (match) {
                        setReliableStadiumImage(imgEl, match);
                    } else {
                        imgEl.src = liveStadium.img;
                    }
                    imgEl.alt = liveStadium.name;
                }
                document.getElementById('popup-title').innerHTML = `<span>📍</span> <span>${liveStadium.name.toUpperCase()}</span>`;
                document.getElementById('popup-sub').innerHTML = `<b>${liveStadium.match}</b><br><span style="font-size:11px; opacity:0.9; display:block; margin-top:4px; line-height:1.4;">⏰ ${liveStadium.time} • 🎫 Cap: ${liveStadium.capacity}<br>⛅ ${liveStadium.weather}</span>`;
                
                popup.style.display = 'flex';
                // Trigger reflow for transition
                popup.style.opacity = '0';
                popup.style.transform = 'translate(-50%, -115%) scale(0.95)';
                setTimeout(() => {
                    popup.style.opacity = '1';
                    popup.style.transform = 'translate(-50%, -120%) scale(1)';
                }, 10);
            }
        }

        function closePopup() {
            selectedAbbreviation = null;
            selectedStadiumId = null;
            const popup = document.getElementById('globe-popup');
            if (popup) {
                popup.style.opacity = '0';
                popup.style.transform = 'translate(-50%, -115%) scale(0.95)';
                setTimeout(() => {
                    popup.style.display = 'none';
                }, 200);
            }
            // Remove selected classes
            const labels = document.querySelectorAll('.pin-label');
            labels.forEach(label => label.classList.remove('selected'));
        }

        function onPopupActionClick() {
            if (selectedAbbreviation) {
                if (window.Android && window.Android.onCountryClick) {
                    window.Android.onCountryClick(selectedAbbreviation);
                }
            } else if (selectedStadiumId) {
                if (window.Android && window.Android.onStadiumClick) {
                    window.Android.onStadiumClick(selectedStadiumId);
                }
            }
        }

        // Smooth rotation interpolation to selected country
        let isRotatingToTarget = false;
        let targetCamPos = new THREE.Vector3();

        function rotateToTarget(lat, lon) {
            // Calculate spherical target direction vector
            const direction = latLongToVector3(lat, lon, camera.position.length());
            // Transform local vector to world space to account for globe rotation
            direction.applyMatrix4(globeSphere.matrixWorld);
            targetCamPos.copy(direction);
            isRotatingToTarget = true;
        }

        // Bridge function to change filter stage from Android
        function setStageFromAndroid(stage) {
            selectedStage = stage;
            createPins();
            createLabels();
            if (selectedAbbreviation) {
                showPopupForTeam(selectedAbbreviation);
            }
        }

        // Bridge function to toggle light/dark theme dynamically
        function setThemeFromAndroid(themeName) {
            currentMode = themeName;
            if (themeName === 'dark') {
                document.body.classList.add('dark');
                document.body.classList.remove('light');
            } else {
                document.body.classList.add('light');
                document.body.classList.remove('dark');
            }
            buildGlobe();
            createPins();
            if (selectedAbbreviation) {
                showPopupForTeam(selectedAbbreviation);
            }
        }

        // Bridge function to sync Compose Zoom slider with Three.js camera distance
        function setZoomFromAndroid(scale) {
            if (!controls) return;
            const baseDistance = 11;
            const targetDistance = baseDistance / scale;
            
            // Set min/max temporarily to force distance update
            controls.minDistance = targetDistance;
            controls.maxDistance = targetDistance;
            controls.update();
            
            // Reset to original zoom limits
            controls.minDistance = 6;
            controls.maxDistance = 16;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Animation Frame Loop
        function animate() {
            requestAnimationFrame(animate);

            // Auto Rotate slowly if user is not active and not rotating to target
            const isUserInteracting = (controls.state !== -1);
            if (!isUserInteracting && !isRotatingToTarget && globeSphere) {
                globeSphere.rotation.y += 0.0007; // Smooth, slow rotation
            }

            // Smooth interpolation to target cam position
            if (isRotatingToTarget) {
                camera.position.lerp(targetCamPos, 0.05);
                if (camera.position.distanceTo(targetCamPos) < 0.05) {
                    isRotatingToTarget = false;
                }
            }

            // Animate pulsing rings flat on the sphere
            const time = Date.now() * 0.003;
            pulsingRings.forEach(ring => {
                const scale = 1.0 + Math.sin(time) * 0.3;
                ring.scale.set(scale, scale, 1.0);
                ring.material.opacity = 0.7 - (scale - 0.7) * 0.5;
            });

            // Spin the 3D soccer ball pin dynamically
            if (soccerBallMesh) {
                soccerBallMesh.rotation.y += 0.015;
                soccerBallMesh.rotation.x += 0.008;
            }

            controls.update();
            updateLabelPositions();
            renderer.render(scene, camera);
        }

        // Projects 3D vectors to 2D html space
        function updateLabelPositions() {
            const tempV = new THREE.Vector3();
            const popup = document.getElementById('globe-popup');
            
            teams.forEach(team => {
                const el = document.getElementById('label-' + team.abbreviation);
                if (!el) return;

                const pos = latLongToVector3(team.lat, team.lon, sphereRadius);
                
                // Account for total scene/globe rotation
                pos.applyMatrix4(globeSphere.matrixWorld);

                // Project to Screen
                tempV.copy(pos);
                tempV.project(camera);

                // Check if the pin is on the back side of the sphere (facing away)
                const cameraToPin = new THREE.Vector3().subVectors(pos, camera.position).normalize();
                const normal = pos.clone().normalize();
                const dot = cameraToPin.dot(normal);

                if (dot < 0) {
                    // Convert projected normalized device coords to screen coords
                    const x = (tempV.x *  .5 + .5) * window.innerWidth;
                    const y = (tempV.y * -.5 + .5) * window.innerHeight;

                    el.style.display = 'flex';
                    el.style.left = `${x}px`;
                    el.style.top = `${y}px`;

                    // If this is the currently selected abbreviation, position the popup right above it!
                    if (team.abbreviation === selectedAbbreviation && popup && popup.style.display === 'flex') {
                        popup.style.left = `${x}px`;
                        popup.style.top = `${y}px`;
                    }
                } else {
                    el.style.display = 'none';
                    if (team.abbreviation === selectedAbbreviation && popup) {
                        popup.style.display = 'none'; // Hide popup if the selected pin rotates to the back
                    }
                }
            });

            // POSITION LIVE STADIUM LABEL
            const liveStadium = getLiveStadium();
            const elStadium = document.getElementById('label-' + liveStadium.id);
            if (elStadium) {
                const pos = latLongToVector3(liveStadium.lat, liveStadium.lon, sphereRadius);
                
                // Account for total scene/globe rotation
                pos.applyMatrix4(globeSphere.matrixWorld);

                // Project to Screen
                tempV.copy(pos);
                tempV.project(camera);

                // Check if the pin is on the back side of the sphere (facing away)
                const cameraToPin = new THREE.Vector3().subVectors(pos, camera.position).normalize();
                const normal = pos.clone().normalize();
                const dot = cameraToPin.dot(normal);

                if (dot < 0) {
                    // Convert projected normalized device coords to screen coords
                    const x = (tempV.x *  .5 + .5) * window.innerWidth;
                    const y = (tempV.y * -.5 + .5) * window.innerHeight;

                    elStadium.style.display = 'flex';
                    elStadium.style.left = `${x}px`;
                    elStadium.style.top = `${y}px`;

                    // If this is the currently selected stadium, position the popup right above it!
                    if (selectedStadiumId === liveStadium.id && popup && popup.style.display === 'flex') {
                        popup.style.left = `${x}px`;
                        popup.style.top = `${y}px`;
                    }
                } else {
                    elStadium.style.display = 'none';
                    if (selectedStadiumId === liveStadium.id && popup) {
                        popup.style.display = 'none'; // Hide popup if the selected pin rotates to the back
                    }
                }
            }
        }

        // Run setup
        window.onload = init;
    </script>
</body>
</html>
