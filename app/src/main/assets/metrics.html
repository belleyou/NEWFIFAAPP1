<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Performance Metrics</title>
    <!-- Load React and Recharts from CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
        }
        .recharts-default-tooltip {
            background-color: #1e293b !important;
            border: 1px solid #475569 !important;
            border-radius: 8px !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // Data for the quarter-finalists (goals, shots on target)
        const teamMetrics = {
            "ARG": { name: "Argentina", flag: "🇦🇷", goals: 11, shotsOnTarget: 34, wins: 4, possession: 58 },
            "FRA": { name: "France", flag: "🇫🇷", goals: 9, shotsOnTarget: 29, wins: 3, possession: 54 },
            "ESP": { name: "Spain", flag: "🇪🇸", goals: 13, shotsOnTarget: 41, wins: 5, possession: 60 },
            "BRA": { name: "Brazil", flag: "🇧🇷", goals: 10, shotsOnTarget: 32, wins: 3, possession: 55 },
            "ENG": { name: "England", flag: "🏴󠁧󠁢󠁥󠁮󠁧󠁿", goals: 8, shotsOnTarget: 27, wins: 3, possession: 52 },
            "USA": { name: "United States", flag: "🇺🇸", goals: 7, shotsOnTarget: 22, wins: 2, possession: 48 },
            "MEX": { name: "Mexico", flag: "🇲🇽", goals: 6, shotsOnTarget: 20, wins: 2, possession: 50 },
            "CAN": { name: "Canada", flag: "🇨🇦", goals: 5, shotsOnTarget: 18, wins: 1, possession: 46 }
        };

        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;

        function MetricsApp() {
            const [selectedTeam, setSelectedTeam] = React.useState("ARG");
            const [metrics, setMetrics] = React.useState(teamMetrics);

            React.useEffect(() => {
                // Bridge to receive selected team from Android Webview
                window.setTeamFromAndroid = (abbr, name, flag, goals, shotsOnTarget, wins, possession) => {
                    const cleanAbbr = (abbr || "").toUpperCase().trim();
                    if (!cleanAbbr) return;

                    setMetrics(prev => {
                        const updated = { ...prev };
                        if (!updated[cleanAbbr]) {
                            updated[cleanAbbr] = {
                                name: name || cleanAbbr,
                                flag: flag || "⚽",
                                goals: goals || Math.floor(Math.random() * 8) + 4,
                                shotsOnTarget: shotsOnTarget || Math.floor(Math.random() * 20) + 15,
                                wins: wins || Math.floor(Math.random() * 3) + 2,
                                possession: possession || Math.floor(Math.random() * 15) + 45
                            };
                        }
                        return updated;
                    });
                    setSelectedTeam(cleanAbbr);
                };
            }, []);

            const currentData = metrics[selectedTeam] || metrics["ARG"] || { name: selectedTeam, flag: "⚽", goals: 8, shotsOnTarget: 25, wins: 3, possession: 52 };
            const allTeamsData = Object.keys(metrics).map(key => ({
                abbr: key,
                name: metrics[key].name,
                goals: metrics[key].goals,
                shotsOnTarget: metrics[key].shotsOnTarget
            }));

            return React.createElement('div', { className: "flex flex-col gap-5 pb-8" },
                // Header Selector
                React.createElement('div', { className: "flex flex-wrap gap-2 justify-center mb-1" },
                    Object.keys(metrics).map(abbr => 
                        React.createElement('button', {
                            key: abbr,
                            onClick: () => setSelectedTeam(abbr),
                            className: `px-3 py-1.5 rounded-full text-xs font-bold transition-all duration-200 ${
                                selectedTeam === abbr 
                                ? 'bg-gradient-to-r from-orange-500 to-red-600 text-white shadow-lg scale-105 border border-orange-400' 
                                : 'bg-slate-800 text-slate-300 hover:bg-slate-700 border border-slate-700'
                            }`
                        }, `${metrics[abbr].flag} ${abbr}`)
                    )
                ),

                // Selected Team Stats Card
                React.createElement('div', { className: "bg-slate-800/80 backdrop-blur border border-slate-700 rounded-xl p-4 flex flex-col gap-2 shadow-inner" },
                    React.createElement('div', { className: "flex items-center gap-3" },
                        React.createElement('span', { className: "text-3xl" }, currentData.flag),
                        React.createElement('div', null,
                            React.createElement('h2', { className: "text-base font-black text-white tracking-wide" }, currentData.name),
                            React.createElement('p', { className: "text-xs text-slate-400" }, "2026 Quarter-Finalist Analytics")
                        )
                    ),
                    React.createElement('div', { className: "grid grid-cols-2 gap-3 mt-2" },
                        React.createElement('div', { className: "bg-slate-900/60 p-3 rounded-lg border border-slate-800/60 flex flex-col justify-center" },
                            React.createElement('p', { className: "text-xs text-slate-400 font-semibold" }, "Goals Scored"),
                            React.createElement('p', { className: "text-2xl font-black text-orange-500 mt-1" }, currentData.goals)
                        ),
                        React.createElement('div', { className: "bg-slate-900/60 p-3 rounded-lg border border-slate-800/60 flex flex-col justify-center" },
                            React.createElement('p', { className: "text-xs text-slate-400 font-semibold" }, "Shots on Target"),
                            React.createElement('p', { className: "text-2xl font-black text-sky-400 mt-1" }, currentData.shotsOnTarget)
                        )
                    )
                ),

                // Chart Container
                React.createElement('div', { className: "bg-slate-800/40 border border-slate-700/50 rounded-xl p-3" },
                    React.createElement('h3', { className: "text-xs font-black text-slate-300 mb-3 text-center uppercase tracking-wider" }, "Goals vs Shots on Target Comparison"),
                    React.createElement('div', { style: { width: '100%', height: 230 } },
                        React.createElement(ResponsiveContainer, null,
                            React.createElement(BarChart, {
                                data: allTeamsData,
                                margin: { top: 5, right: 5, left: -25, bottom: 5 }
                            },
                                React.createElement(CartesianGrid, { strokeDasharray: "3 3", stroke: "#334155" }),
                                React.createElement(XAxis, { dataKey: "abbr", stroke: "#94a3b8", fontSize: 11, fontWeight: "bold" }),
                                React.createElement(YAxis, { stroke: "#94a3b8", fontSize: 11 }),
                                React.createElement(Tooltip, {
                                    contentStyle: { backgroundColor: '#1e293b', borderColor: '#475569', borderRadius: '8px' },
                                    labelStyle: { fontWeight: 'bold', color: '#fff' }
                                }),
                                React.createElement(Legend, { wrapperStyle: { fontSize: '11px', fontWeight: 'bold', paddingTop: '8px' } }),
                                React.createElement(Bar, { dataKey: "goals", name: "Goals", fill: "#f97316", radius: [3, 3, 0, 0] }),
                                React.createElement(Bar, { dataKey: "shotsOnTarget", name: "Shots on Target", fill: "#38bdf8", radius: [3, 3, 0, 0] })
                            )
                        )
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(MetricsApp));
    </script>
</body>
</html>
